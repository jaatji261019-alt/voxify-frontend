<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voxify AI</title>

  <!-- 🎨 CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- 🔤 FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
</head>

<body>

  <div class="container">

    <!-- 🔥 HEADER -->
    <div class="header">
      <h1>🎙 Voxify AI</h1>
      <button id="themeToggle">🌙</button>
    </div>

    <!-- ========================= -->
    <!-- 🎧 TEXT TO SPEECH -->
    <!-- ========================= -->
    <div class="section">

      <h2>🎧 Text to Speech</h2>

      <!-- 📄 FILE UPLOAD -->
      <div class="upload-box">
        <input type="file" id="fileInput" onchange="uploadFile()" />
        <p id="fileType">No file selected</p>
      </div>

      <!-- ✍️ TEXT -->
      <textarea id="text" placeholder="Type or paste your text here..."></textarea>

      <!-- 🎚 CONTROLS -->
      <div class="controls">
        <select id="language">
          <option value="auto">🌍 Auto Detect</option>
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="es">Spanish</option>
          <option value="ar">Arabic</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
        </select>

        <select id="voiceSelect"></select>
      </div>

      <!-- 🎮 ACTION BUTTONS -->
      <div class="buttons">
        <button onclick="preview()">▶ Preview</button>
        <button onclick="stopPreview()">⏹ Stop</button>
        <button onclick="generate()">⚡ Generate</button>
      </div>

      <!-- 🎧 AUDIO CONTROLS -->
      <div class="buttons">
        <button onclick="playAudio()">▶ Play</button>
        <button onclick="pauseAudio()">⏸ Pause</button>
        <button onclick="stopAudio()">⏹ Stop</button>
        <button onclick="download()">⬇ Download MP3</button>
      </div>

      <!-- 📊 PROGRESS -->
      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>
      <p id="progressText">0%</p>

      <!-- 🔄 LOADER -->
      <div id="loader" class="loader"></div>

      <!-- 🎧 AUDIO PLAYER -->
      <audio id="player" controls></audio>

    </div>

    <!-- ========================= -->
    <!-- 🎬 TEXT TO VIDEO -->
    <!-- ========================= -->
    <div class="section">

      <h2>🎬 Text to Video</h2>

      <p class="info">
        👉 Step 1: Generate audio above <br>
        👉 Step 2: Click button below
      </p>

      <div class="buttons">
        <button onclick="createVideo()">🎬 Create & Download Video</button>
      </div>

      <!-- 🎬 CANVAS -->
      <canvas id="videoCanvas" width="720" height="1280"></canvas>

    </div>

  </div>

  <!-- 🔥 SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
