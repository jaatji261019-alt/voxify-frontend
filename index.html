<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voxify AI</title>

  <!-- 🎨 CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- 🔤 FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
</head>

<body>

  <div class="container">

    <!-- 🔥 HEADER -->
    <div class="header">
      <div>
        <h1>🎙 Voxify AI</h1>
        <div class="tagline">JAATJI'S WORLD</div>
      </div>
      <button id="themeToggle">🌙</button>
    </div>

    <!-- ========================= -->
    <!-- 🎧 AUDIO SECTION -->
    <!-- ========================= -->
    <div class="section">

      <h2>🎧 Audio Generator (TTS)</h2>

      <!-- 📄 FILE UPLOAD -->
      <div class="upload-box">
        <input type="file" id="fileInput" onchange="uploadFile()" />
        <p id="fileType">No file selected</p>
      </div>

      <!-- ✍️ TEXT -->
      <textarea id="text" placeholder="Type or paste your text here..."></textarea>

      <!-- 🎚 CONTROLS -->
      <div class="controls">
        <select id="language">
          <option value="auto">🌍 Auto Detect</option>
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="ar">Arabic</option>
        </select>

        <select id="voiceSelect"></select>
      </div>

      <!-- 🎮 BUTTONS -->
      <div class="buttons">
        <button onclick="preview()">▶ Preview</button>
        <button onclick="stopPreview()">⏹ Stop</button>
        <button onclick="generateAudio()">⚡ Generate Audio</button>
      </div>

      <!-- 🎧 AUDIO CONTROLS -->
      <div class="buttons">
        <button onclick="playAudio()">▶ Play</button>
        <button onclick="pauseAudio()">⏸ Pause</button>
        <button onclick="stopAudio()">⏹ Stop</button>
        <button onclick="downloadAudio()">⬇ Download MP3</button>
      </div>

      <!-- 📊 PROGRESS -->
      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>
      <p id="progressText">Ready</p>

      <!-- 🔄 LOADER -->
      <div id="loader" class="loader"></div>

      <!-- 🎧 AUDIO PLAYER -->
      <audio id="player" controls style="display:none;"></audio>

    </div>

    <!-- ========================= -->
    <!-- 🖼 IMAGE SECTION -->
    <!-- ========================= -->
    <div class="section">

      <h2>🖼 AI Image Generator</h2>

      <div class="buttons">
        <button onclick="generateImages()">🖼 Generate Images</button>
        <button onclick="downloadImages()">⬇ Download Images</button>
      </div>

      <!-- 🖼 OUTPUT -->
      <div id="imageContainer"></div>

    </div>

    <!-- ========================= -->
    <!-- 🎬 VIDEO SECTION -->
    <!-- ========================= -->
    <div class="section">

      <h2>🎬 Cinematic Video Generator</h2>

      <p class="info">
        👉 Step 1: Generate Audio <br>
        👉 Step 2: Generate Video
      </p>

      <div class="buttons">
        <button onclick="generateVideo()">🎥 Generate Video</button>
        <button onclick="downloadVideo()">⬇ Download Video</button>
      </div>

      <!-- 🎬 VIDEO PLAYER -->
      <video id="videoPlayer" controls style="width:100%; display:none; margin-top:10px;"></video>

    </div>

  </div>

  <!-- 🔥 SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
